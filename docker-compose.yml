services:
  ocr-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ocr-api:latest
    container_name: ocr-api
    ports:
      - "4242:4242"
    environment:
      - DATALAB_API_KEYS=${DATALAB_API_KEYS:?DATALAB_API_KEYS is required}
      - DATALAB_BASE_URL=${DATALAB_BASE_URL:-https://www.datalab.to/api/v1}
      - DATALAB_POLL_INTERVAL=${DATALAB_POLL_INTERVAL:-2}
      - DATALAB_POLL_TIMEOUT=${DATALAB_POLL_TIMEOUT:-120}
      - DATALAB_HTTP_TIMEOUT=${DATALAB_HTTP_TIMEOUT:-90}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-5}
    volumes:
      - ocr-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4242/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 5s

volumes:
  ocr-uploads:
    driver: local

networks:
  default:
    name: ocr-network
    driver: bridge
