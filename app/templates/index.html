<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR AI — Document Intelligence Platform</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    </script>
</head>
<body>
<div class="app" id="app">

    <!-- ============== TOP BAR ============== -->
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <div class="brand-mark">
                    <i data-lucide="scan-text"></i>
                </div>
                <div class="brand-text">OCR AI <span class="sub">/ Document Intelligence</span></div>
            </div>

            <div class="topbar-actions">
                <label class="option-toggle" title="Draw bounding boxes">
                    <input type="checkbox" id="toggle-bbox" checked />
                    <span class="toggle-track"></span>
                    <span class="toggle-label">BBox</span>
                </label>

                <div class="divider-v"></div>

                <button class="btn btn-secondary" id="btn-upload">
                    <i data-lucide="upload"></i>
                    <span>Upload</span>
                </button>
                <input type="file" id="file-input" accept="image/*,.pdf" class="hidden" />

                <button class="btn btn-primary" id="btn-process" disabled>
                    <i data-lucide="zap"></i>
                    <span>Process OCR</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ============== MAIN ============== -->
    <main class="main">

        <!-- KPI Cards -->
        <div class="kpi-grid">
            <div class="kpi kpi-compact" title="Total Blocks">
                <div class="kpi-icon blue"><i data-lucide="layers"></i></div>
                <div class="kpi-value" id="kpi-blocks">—</div>
            </div>
            <div class="kpi kpi-compact" title="Tables Found">
                <div class="kpi-icon green"><i data-lucide="table-2"></i></div>
                <div class="kpi-value" id="kpi-tables">—</div>
            </div>
            <div class="kpi kpi-compact" title="OCR Confidence">
                <div class="kpi-icon purple"><i data-lucide="gauge"></i></div>
                <div class="kpi-value" id="kpi-confidence">—</div>
            </div>
            <div class="kpi kpi-compact" title="Processing Time">
                <div class="kpi-icon amber"><i data-lucide="timer"></i></div>
                <div class="kpi-value" id="kpi-time">—</div>
            </div>
        </div>

        <!-- Workspace -->
        <div class="workspace">
            <!-- LEFT: Viewer -->
            <section class="card">
                <div class="card-head">
                    <div class="card-title">
                        <i data-lucide="image"></i>
                        Document Viewer
                    </div>
                    <button class="icon-btn" id="btn-fullscreen" title="Fullscreen">
                        <i data-lucide="maximize-2"></i>
                    </button>
                </div>
                <div class="card-body">
                    <div class="viewer" id="viewer"></div>
                </div>
            </section>

            <!-- RIGHT: Results -->
            <section class="card results">
                <div class="card-head">
                    <div class="card-title">
                        <i data-lucide="file-search"></i>
                        OCR Results
                    </div>
                    <div class="dropdown" id="export-dropdown">
                        <button class="btn btn-ghost btn-sm" id="btn-export">
                            <i data-lucide="download"></i>
                            <span>Export</span>
                            <i data-lucide="chevron-down"></i>
                        </button>
                        <div class="dropdown-menu">
                            <button class="dropdown-item" data-export="json">
                                <i data-lucide="braces"></i>
                                <span>Download JSON</span>
                            </button>
                            <button class="dropdown-item" data-export="markdown">
                                <i data-lucide="file-text"></i>
                                <span>Download Markdown</span>
                            </button>
                            <button class="dropdown-item" data-export="txt">
                                <i data-lucide="file"></i>
                                <span>Download TXT</span>
                            </button>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item" data-export="copy">
                                <i data-lucide="copy"></i>
                                <span>Copy all text</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="tabs" id="tabs">
                        <button class="tab active" data-tab="blocks">
                            <i data-lucide="layers"></i>
                            <span>Blocks</span>
                            <span class="count" id="count-blocks">0</span>
                        </button>
                        <button class="tab" data-tab="json">
                            <i data-lucide="braces"></i>
                            <span>JSON</span>
                        </button>
                        <button class="tab" data-tab="markdown">
                            <i data-lucide="file-text"></i>
                            <span>Markdown</span>
                        </button>
                        <button class="tab" data-tab="tables">
                            <i data-lucide="table-2"></i>
                            <span>Tables</span>
                            <span class="count" id="count-tables">0</span>
                        </button>
                    </div>

                    <div class="results-toolbar" id="results-toolbar">
                        <div class="search">
                            <i data-lucide="search"></i>
                            <input type="text" id="search-input" placeholder="Search in results..." />
                        </div>
                        <select class="filter-select" id="filter-type">
                            <option value="all">All types</option>
                            <option value="text">Text</option>
                            <option value="table">Tables</option>
                            <option value="image">Images</option>
                            <option value="math">Math</option>
                        </select>
                    </div>

                    <div id="tab-content" style="flex:1; min-height:0; display:flex; flex-direction:column;">
                        <div class="results-list" id="blocks-list"></div>
                        <div class="code-view hidden" id="json-view"></div>
                        <div class="code-view hidden" id="md-view"></div>
                        <div class="results-list hidden" id="tables-list"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>

<div class="toast" id="toast">
    <i data-lucide="check-circle"></i>
    <span id="toast-msg">Copied</span>
</div>

<script type="module" src="/static/js/main.js"></script>
</body>
</html>
